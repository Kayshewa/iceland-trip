<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tripi &amp; Kayshewa — Apps</title>
<meta name="description" content="A home for our apps and projects — vacation itineraries, Quado, the C3.ai dashboard, and more.">
<style>
/* ============================================================
   Palette + type — matched to the Iceland trip site
   ============================================================ */
:root{
  --paper:#EDF2F4; --card:#FFFFFF; --card2:#F5F8FA;
  --ink:#141C24; --ink2:#3C4A57; --ink3:#6A7B8A;
  --line:#DBE4E9; --line2:#C7D4DC;
  --accent:#15719B; --accent-2:#0E5877; --accent-soft:#E1EEF4;
  --amber:#C77A16; --amber-soft:#F6E7CE;
  --green:#1f8a5b; --green-soft:#e9f7ef;
  --violet:#7C5CC4; --violet-soft:#efeaf9;
  --rose:#d1495b; --rose-soft:#fdecef;
  --shadow:0 1px 2px rgba(16,40,56,.06),0 8px 24px rgba(16,40,56,.08);
  --shadow-lg:0 2px 6px rgba(16,40,56,.10),0 20px 48px rgba(16,40,56,.16);
  --radius:16px;
  --serif:'Instrument Serif',Georgia,'Times New Roman',serif;
  --sans:'Hanken Grotesk',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#0D1319; --card:#161F28; --card2:#1C2732;
    --ink:#EAF1F5; --ink2:#B4C4CF; --ink3:#7E93A1;
    --line:#26343F; --line2:#33454F;
    --accent:#4FB0DA; --accent-2:#7FCBEC; --accent-soft:#16303D;
    --amber:#E6A542; --amber-soft:#3A2E17;
    --green:#5fd39a; --green-soft:#12271d;
    --violet:#A487E8; --violet-soft:#241a33;
    --rose:#f0919f; --rose-soft:#2c161b;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);
    --shadow-lg:0 2px 6px rgba(0,0,0,.5),0 24px 60px rgba(0,0,0,.6);
  }
}
:root[data-theme="light"]{
  --paper:#EDF2F4; --card:#FFFFFF; --card2:#F5F8FA; --ink:#141C24; --ink2:#3C4A57; --ink3:#6A7B8A;
  --line:#DBE4E9; --line2:#C7D4DC; --accent:#15719B; --accent-2:#0E5877; --accent-soft:#E1EEF4;
  --amber:#C77A16; --amber-soft:#F6E7CE; --green:#1f8a5b; --green-soft:#e9f7ef;
  --violet:#7C5CC4; --violet-soft:#efeaf9; --rose:#d1495b; --rose-soft:#fdecef;
  --shadow:0 1px 2px rgba(16,40,56,.06),0 8px 24px rgba(16,40,56,.08);
  --shadow-lg:0 2px 6px rgba(16,40,56,.10),0 20px 48px rgba(16,40,56,.16);
}
:root[data-theme="dark"]{
  --paper:#0D1319; --card:#161F28; --card2:#1C2732; --ink:#EAF1F5; --ink2:#B4C4CF; --ink3:#7E93A1;
  --line:#26343F; --line2:#33454F; --accent:#4FB0DA; --accent-2:#7FCBEC; --accent-soft:#16303D;
  --amber:#E6A542; --amber-soft:#3A2E17; --green:#5fd39a; --green-soft:#12271d;
  --violet:#A487E8; --violet-soft:#241a33; --rose:#f0919f; --rose-soft:#2c161b;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);
  --shadow-lg:0 2px 6px rgba(0,0,0,.5),0 24px 60px rgba(0,0,0,.6);
}

*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:var(--sans); line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  min-height:100vh;
}
a{color:inherit; text-decoration:none}

.wrap{max-width:960px; margin:0 auto; padding:clamp(24px,5vw,64px) clamp(18px,4vw,32px) 64px}

/* ---- top bar ---- */
.topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:clamp(32px,6vw,56px)}
.brand{display:flex; align-items:center; gap:12px; font-weight:700; letter-spacing:.2px}
.brand .dot{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--green));
  display:grid;place-items:center;color:#fff;font-family:var(--serif);font-size:20px;box-shadow:var(--shadow)}
.brand small{display:block;font-weight:500;color:var(--ink3);font-size:12px;letter-spacing:.3px}
.themebtn{border:1px solid var(--line);background:var(--card);color:var(--ink2);border-radius:10px;
  width:40px;height:40px;display:grid;place-items:center;cursor:pointer;font-size:17px;box-shadow:var(--shadow)}
.themebtn:hover{border-color:var(--line2)}

/* ---- hero ---- */
.hero{margin-bottom:clamp(28px,5vw,44px)}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(38px,7vw,64px);line-height:1.02;margin:0 0 14px}
.hero p{font-size:clamp(16px,2.2vw,19px);color:var(--ink2);max-width:56ch;margin:0}

/* ---- grid ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:clamp(14px,2.5vw,20px)}

.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 22px 20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
.card.link{cursor:pointer}
.card.link:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--line2)}

.card .head{display:flex;align-items:flex-start;gap:14px}
.icon{flex:none;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:23px}
.card h2{font-size:19px;margin:0 0 3px;font-weight:700;letter-spacing:.1px}
.card .kicker{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3)}
.card p.desc{margin:0;color:var(--ink2);font-size:14.5px;flex:1}

/* status pills */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  padding:3px 10px;border-radius:999px;letter-spacing:.2px}
.pill.live{background:var(--green-soft);color:var(--green)}
.pill.soon{background:var(--amber-soft);color:var(--amber)}
.pill.private{background:var(--rose-soft);color:var(--rose)}

.card .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:2px}
.go{font-weight:600;color:var(--accent);font-size:14.5px;display:inline-flex;align-items:center;gap:6px}
.card.link:hover .go{gap:9px}
.go.muted{color:var(--ink3)}

/* accent tints per card */
.t-vac .icon{background:var(--accent-soft);color:var(--accent)}
.t-quado .icon{background:var(--green-soft);color:var(--green)}
.t-c3 .icon{background:var(--violet-soft);color:var(--violet)}
.t-swing .icon{background:var(--amber-soft);color:var(--amber)}
.t-sound .icon{background:var(--rose-soft);color:var(--rose)}
.t-land .icon{background:var(--green-soft);color:var(--green)}

/* ---- submenu (Vacation Itineraries) ---- */
.submenu{display:none;flex-direction:column;gap:2px;margin:2px -6px -4px;padding-top:4px;border-top:1px dashed var(--line)}
.card.open .submenu{display:flex}
.subitem{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:10px;transition:background .15s}
.subitem:hover{background:var(--card2)}
.subitem .flag{font-size:20px;flex:none}
.subitem .st{flex:1;min-width:0}
.subitem .st b{display:block;font-size:14.5px;font-weight:600}
.subitem .st span{font-size:12.5px;color:var(--ink3)}
.subitem .arrow{color:var(--ink3);font-size:15px}
.subempty{padding:10px 8px;color:var(--ink3);font-size:13px;font-style:italic}
.chev{transition:transform .2s ease;color:var(--ink3);font-size:13px}
.card.open .chev{transform:rotate(180deg)}

footer{margin-top:clamp(40px,7vw,72px);padding-top:22px;border-top:1px solid var(--line);
  color:var(--ink3);font-size:13px;display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:space-between}
footer a{color:var(--ink3);text-decoration:underline;text-underline-offset:2px}
footer a:hover{color:var(--accent)}

@media (max-width:520px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<!-- ===== per-app password modal (client-side only; casual privacy, not real security) ===== -->
<div id="applock" role="dialog" aria-modal="true" aria-label="Password required">
  <form id="applock-form" autocomplete="off">
    <button type="button" class="applock-x" aria-label="Cancel">✕</button>
    <div class="applock-lock" aria-hidden="true">🔒</div>
    <h1>Private app</h1>
    <p>Enter the password to open <b id="applock-name">this app</b>.</p>
    <input id="applock-input" type="password" autocomplete="current-password" placeholder="Password" aria-label="Password">
    <div id="applock-err" aria-live="polite"></div>
    <button type="submit">Unlock</button>
  </form>
</div>
<style>
  #applock{position:fixed;inset:0;z-index:2147483647;display:none;align-items:center;justify-content:center;
    background:rgba(9,13,18,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:#eaf1f5;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:24px}
  #applock.show{display:flex}
  #applock-form{position:relative;width:min(92vw,360px);text-align:center;
    background:#111a22;border:1px solid rgba(127,147,161,.28);border-radius:18px;padding:30px 26px 26px}
  @media (prefers-color-scheme:light){#applock-form{background:#fff;color:#141c24}}
  #applock .applock-x{position:absolute;top:12px;right:12px;width:30px;height:30px;padding:0;border:0;
    border-radius:9px;background:transparent;color:inherit;opacity:.5;font-size:16px;line-height:1;cursor:pointer}
  #applock .applock-x:hover{opacity:1;background:rgba(127,147,161,.16)}
  #applock .applock-lock{font-size:38px;margin-bottom:8px}
  #applock h1{font-weight:600;font-size:21px;line-height:1.2;margin:0 0 6px}
  #applock p{margin:0 0 18px;font-size:14px;opacity:.72}
  #applock-input{width:100%;box-sizing:border-box;padding:13px 15px;border-radius:12px;
    border:1px solid rgba(127,147,161,.4);background:rgba(127,147,161,.12);color:inherit;font-size:16px;outline:none}
  #applock-input:focus{border-color:#4fb0da}
  #applock-err{min-height:18px;margin:9px 0 2px;color:#e5484d;font-size:13px}
  #applock button[type=submit]{margin-top:8px;width:100%;padding:13px;border:0;border-radius:12px;
    background:#2f6df6;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
  #applock button[type=submit]:hover{filter:brightness(1.07)}
  html.applock-open{overflow:hidden}
</style>
<!-- ===== end per-app password modal ===== -->

<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <span class="dot">t</span>
      <span>Tripi &amp; Kayshewa<small>tripiandkayshewa.com</small></span>
    </div>
    <button class="themebtn" id="theme" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
  </div>

  <main class="grid" id="grid"></main>

  <footer>
    <span>© <span id="yr"></span> Tripi &amp; Kayshewa</span>
    <span>Built with care · <a href="#" id="editnote" title="Tiles are configured at the top of this file">edit tiles in index.html</a></span>
  </footer>
</div>

<script>
/* ============================================================
   TILE CONFIG — edit here to add/rename/relink apps.
   status: "live"  -> clickable, opens `href`
           "soon"  -> shown, amber pill, not yet linked (set href when ready)
           "private" -> rose "Private" pill; only opens if you set href
   type:  "menu"   -> expands to a submenu of `items` (for collections)
   ============================================================ */
const TILES = [
  {
    id:"vacations", cls:"t-vac", icon:"🧭",
    title:"Vacation Itineraries", kicker:"Travel",
    desc:"Day-by-day trip companions — maps, timelines, and plans. More destinations coming.",
    type:"menu",
    items:[
      { id:"iceland", flag:"🇮🇸", name:"Iceland — South Coast", sub:"5-day trip companion", href:"vacations/iceland/", status:"live", locked:true }
      // add future itineraries here, e.g.
      // { flag:"🇮🇹", name:"Italy — Amalfi Coast", sub:"coming soon", href:"", status:"soon" }
    ]
  },
  {
    id:"quado", cls:"t-quado", icon:"🌿",
    title:"Quado", kicker:"Compliance",
    desc:"Environmental compliance manager for oil & gas — EPA OOOO rule family, built from your asset hierarchy.",
    href:"https://quado.tripiandkayshewa.com", status:"live", locked:true
  },
  {
    id:"c3", cls:"t-c3", icon:"📈",
    title:"C3.ai Dashboard", kicker:"Markets",
    desc:"A live research dashboard for C3.ai (NYSE: AI) — price, technicals, filings, news, and a forecast.",
    href:"https://c3.tripiandkayshewa.com", status:"live", locked:true
  },
  {
    id:"swingbot", cls:"t-swing", icon:"🤖",
    title:"SwingBot", kicker:"Markets",
    desc:"An autonomous long-only swing-trader — a read-only look at how it reads the market regime, gates every trade, and screens its universe. Account balances and controls stay private.",
    href:"apps/swingbot/", status:"live", locked:true
  },
  {
    id:"soundboard", cls:"t-sound", icon:"🎵",
    title:"DJ Money's Soundboard", kicker:"Classroom",
    desc:"A cafe-themed classroom soundboard — magic wand, applause, crickets, drumroll, and more, plus buttons you can load your own sounds onto. Works offline.",
    href:"apps/soundboard/", status:"live", locked:false
  },
  {
    id:"landscout", cls:"t-land", icon:"🌲",
    title:"LandScout", kicker:"Real Estate",
    desc:"Greater Houston land finder — aggregates free listing and government-auction sources, with utility signals (water/sewer/electric/gas) and comps-based deal scores.",
    href:"https://land.tripiandkayshewa.com", status:"soon", locked:false
  }
];

/* ---------- render ---------- */
const PILL = {
  live:    '<span class="pill live">● Live</span>',
  soon:    '<span class="pill soon">◔ Coming soon</span>',
  private: '<span class="pill private">🔒 Private</span>'
};
const ARROW = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

function tileHTML(t){
  const head = `<div class="head">
      <div class="icon">${t.icon}</div>
      <div><div class="kicker">${t.kicker}</div><h2>${t.title}</h2></div>
    </div>
    <p class="desc">${t.desc}</p>`;

  if(t.type === "menu"){
    const items = (t.items||[]).map(it => {
      const clickable = it.status === "live" && it.href;
      const tag = clickable ? "a" : "div";
      const nav = clickable ? ` href="${it.href}" data-href="${it.href}" data-app="${it.id||it.name}" data-name="${it.name}"${it.locked?' data-locked="1"':''}` : "";
      const lockPill = clickable && it.locked ? ` <span class="pill private" style="transform:scale(.82)">🔒</span>` : "";
      const arrow = clickable ? `<span class="arrow">${ARROW}</span>` : `<span class="pill soon" style="transform:scale(.9)">soon</span>`;
      return `<${tag} class="subitem"${nav}>
          <span class="flag">${it.flag||"📍"}</span>
          <span class="st"><b>${it.name}${lockPill}</b><span>${it.sub||""}</span></span>
          ${arrow}
        </${tag}>`;
    }).join("");
    const body = items || `<div class="subempty">Nothing here yet — check back soon.</div>`;
    return `<div class="card t-menu ${t.cls}" data-menu="1">
        ${head}
        <div class="foot">
          <span class="go">${(t.items||[]).length} itinerar${(t.items||[]).length===1?"y":"ies"}</span>
          <span class="chev">▾</span>
        </div>
        <div class="submenu">${body}</div>
      </div>`;
  }

  const clickable = !!t.href;
  const goText = t.status === "private" ? "Private" : (t.status === "soon" ? "Not yet live" : (t.locked ? "Unlock" : "Open"));
  const go = `<span class="go ${clickable?"":"muted"}">${clickable&&t.locked?"🔒 ":""}${goText} ${clickable?ARROW:""}</span>`;
  const nav = clickable ? ` data-href="${t.href}" data-app="${t.id}" data-name="${t.title}"${t.locked?' data-locked="1"':''}` : "";
  return `<div class="card ${clickable?"link":""} ${t.cls}"${nav}>
      ${head}
      <div class="foot">${PILL[t.status]||""}${go}</div>
    </div>`;
}

const grid = document.getElementById("grid");
grid.innerHTML = TILES.map(tileHTML).join("");

/* ---------- per-app password gate ---------- */
(function(){
  var PW = "VHJhc2hDYXQh"; // base64 of the shared app password
  var lock   = document.getElementById("applock"),
      form   = document.getElementById("applock-form"),
      input  = document.getElementById("applock-input"),
      errBox = document.getElementById("applock-err"),
      nameEl = document.getElementById("applock-name"),
      htmlEl = document.documentElement;
  var pending = null;

  function unlocked(app){ try{ return localStorage.getItem("tk_app_"+app)==="1"; }catch(e){ return false; } }
  function remember(app){ try{ localStorage.setItem("tk_app_"+app,"1"); }catch(e){} }
  function closeLock(){ lock.classList.remove("show"); htmlEl.classList.remove("applock-open"); pending=null; }
  function openLock(name, cb){
    pending = cb; nameEl.textContent = name || "this app";
    errBox.textContent = ""; input.value = "";
    lock.classList.add("show"); htmlEl.classList.add("applock-open");
    setTimeout(function(){ try{ input.focus(); }catch(e){} }, 30);
  }

  // click intercept for any tile/link carrying data-href
  grid.addEventListener("click", function(e){
    var nav = e.target.closest("[data-href]");
    if(!nav || !grid.contains(nav)) return;
    e.preventDefault();
    var href = nav.getAttribute("data-href"),
        app  = nav.getAttribute("data-app"),
        name = nav.getAttribute("data-name"),
        locked = nav.hasAttribute("data-locked");
    if(!locked || unlocked(app)){ location.href = href; return; }
    openLock(name, function(){ remember(app); location.href = href; });
  });

  form.addEventListener("submit", function(e){
    e.preventDefault();
    if(input.value === atob(PW)){ var cb=pending; closeLock(); if(cb) cb(); }
    else { errBox.textContent = "Incorrect password. Try again."; input.value=""; input.focus(); }
  });
  form.querySelector(".applock-x").addEventListener("click", closeLock);
  lock.addEventListener("click", function(e){ if(e.target === lock) closeLock(); });
  document.addEventListener("keydown", function(e){ if(e.key === "Escape" && lock.classList.contains("show")) closeLock(); });
})();

// expand/collapse the menu cards
grid.querySelectorAll('[data-menu]').forEach(card=>{
  card.classList.add("open"); // open by default (only one item today)
  const toggle = e=>{
    if(e.target.closest("a")) return;      // let submenu links through
    card.classList.toggle("open");
  };
  card.querySelector(".head").addEventListener("click", toggle);
  card.querySelector(".foot").addEventListener("click", toggle);
  card.querySelector(".desc").addEventListener("click", toggle);
});

/* ---------- theme toggle ---------- */
const root = document.documentElement;
const saved = localStorage.getItem("tk-theme");
if(saved) root.setAttribute("data-theme", saved);
document.getElementById("theme").addEventListener("click", ()=>{
  const cur = root.getAttribute("data-theme")
    || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  const next = cur === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
  localStorage.setItem("tk-theme", next);
});

document.getElementById("yr").textContent = new Date().getFullYear();
document.getElementById("editnote").addEventListener("click", e=>e.preventDefault());
</script>
</body>
</html>
